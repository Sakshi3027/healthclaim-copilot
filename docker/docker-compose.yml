version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: healthclaim_postgres
    environment:
      POSTGRES_USER: healthclaim
      POSTGRES_PASSWORD: healthclaim123
      POSTGRES_DB: healthclaim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: healthclaim_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
